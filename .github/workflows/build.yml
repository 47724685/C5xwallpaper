name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL \
            "https://github.com/gradle/gradle/raw/v7.5.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Grant gradlew permission
        run: |
          chmod +x gradlew
          git update-index --chmod=+x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --info 2>&1 | tee build_log.txt
          exit ${PIPESTATUS[0]}

      - name: Show Kotlin errors if failed
        if: failure()
        run: |
          echo "=== Kotlin编译错误 ==="
          grep -E "error:|\.kt:[0-9]+" build_log.txt | head -80 || true
          echo "=== 完整日志末尾200行 ==="
          tail -200 build_log.txt || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wallpaper-debug-apk
          path: app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Upload build log if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt
          retention-days: 7
